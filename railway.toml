# railway.toml — tells Railway to build from the repo's Dockerfile
# and start the combined server+UI process on port 3100.

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "pnpm paperclipai allowed-hostname manage.voicequoter.com; node --import ./server/node_modules/tsx/dist/loader.mjs server/dist/index.js"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
